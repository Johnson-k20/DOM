<!--A good next challenge is to extend this into a mini student management system:

Add student ID
Add course
Add date added
Search students
Sort students alphabetically
Count total students
Store objects instead of strings
This will give you practice with more complex data structures, DOM manipulation, and localStorage. You can also experiment with different UI designs and features to make it your own!-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="three.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Student Management System</h1>
        <div class="mb-3">
            <input type="text" id="student-name" class="form-control" placeholder="Enter student name">
        </div>
        <div class="mb-3">
            <input type="text" id="student-id" class="form-control" placeholder="Enter student ID">
        </div>
        <div class="mb-3">
            <input type="text" id="student-course" class="form-control" placeholder="Enter course">
        </div>
        <button id="add-student-btn" class="btn btn-primary">Add Student</button>
        <hr>
        <input type="text" id="search-student" class="form-control mb-3" placeholder="Search students...">
        <ul id="student-list" class="list-group"></ul>
    </div>
     <div class="container mt-5">
        <h2>Total Students: <span id="total-students">0</span></h2>
    </div>
    <script src="three.js"></script>





    
</body>
</html>
